# Required vars: IMAGE_NAME
name: Deploy Image to GHCR

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag (e.g. 1.0.0). Omit to use git tag or latest.'
        required: false
        default: ''

jobs:
  deploy:
    name: Build and push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.ref }}

      - name: Validate vars
        run: |
          missing=""
          [ -z "${{ vars.IMAGE_NAME }}" ] && missing="$missing IMAGE_NAME"
          if [ -n "$missing" ]; then
            echo "::error::Missing repository variables:$missing"
            echo "Set them in: Settings → Secrets and variables → Actions → Variables"
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (multi-arch)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ vars.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=${{ inputs.image_tag }},enable=${{ inputs.image_tag != '' }}
            type=raw,value=latest,enable=${{ inputs.image_tag == '' && github.event_name != 'push' }}
          labels: |
            org.opencontainers.image.title=${{ vars.IMAGE_NAME }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Extract Docker metadata (amd64-only)
        id: meta_amd64
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ vars.IMAGE_NAME }}
          flavor: |
            suffix=-amd64
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=${{ inputs.image_tag }},enable=${{ inputs.image_tag != '' }}
            type=raw,value=latest,enable=${{ inputs.image_tag == '' && github.event_name != 'push' }}
          labels: |
            org.opencontainers.image.title=${{ vars.IMAGE_NAME }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Build and push image to GHCR (linux/amd64, linux/arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.ubi
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Build and push image to GHCR (linux/amd64 only)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.ubi
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta_amd64.outputs.tags }}
          labels: ${{ steps.meta_amd64.outputs.labels }}
