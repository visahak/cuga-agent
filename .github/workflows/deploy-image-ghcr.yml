# Required vars: IMAGE_NAME, IMAGE_TAG (optional, defaults to 'latest')
name: Deploy Image to GHCR

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag (e.g. 1.0.0, latest)'
        required: false
        default: 'latest'
      branch:
        description: 'Git ref to build (branch, tag, or SHA). Defaults to main.'
        required: false
        default: 'main'

jobs:
  deploy:
    name: Build and push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.branch != '' && inputs.branch || 'main' }}

      - name: Validate vars
        run: |
          missing=""
          [ -z "${{ vars.IMAGE_NAME }}" ] && missing="$missing IMAGE_NAME"
          if [ -n "$missing" ]; then
            echo "::error::Missing repository variables:$missing"
            echo "Set them in: Settings → Secrets and variables → Actions → Variables"
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tag
        id: tag
        run: |
          TAG="${{ inputs.image_tag }}"
          [ -z "$TAG" ] && TAG="${{ vars.IMAGE_TAG }}"
          [ -z "$TAG" ] && TAG="latest"
          echo "value=$TAG" >> $GITHUB_OUTPUT

      - name: Build and push image to GHCR
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.ubi
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ghcr.io/${{ github.repository_owner }}/${{ vars.IMAGE_NAME }}:${{ steps.tag.outputs.value }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
