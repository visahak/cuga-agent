[page_understanding]
transformer_path = "cuga.backend.browser_env.page_understanding.pu_transform.PageUnderstandingV1"
demo_nocodeui_pu = false

[evaluation]
max_steps = 55

[demo_mode]
start_url = "https://opensource-demo.orangehrmlive.com/web/index.php/auth/login"

[features]
cuga_mode = "balanced"
memory_provider = "mem0"

[advanced_features]
web_arena_eval = false
use_vision = true
use_paraphrase = false
tracker_enabled = false
use_location_resolver = false
langfuse_tracing = false
wxo_integration = false
benchmark = "default"
mode = 'api'
use_extension = false
code_planner_enabled = true
api_planner_hitl = false
lite_mode = true  # Enable CugaLite for simple API tasks (faster execution)
lite_mode_tool_threshold = 70  # Route to CugaLite if app has fewer than this many tools
force_lite_mode_apps = ["knowledge"]  # List of app names to force into lite mode (e.g., ["app1", "app2"])
shortlisting_tool_threshold = 35  # Enable find_tools if total number of tools exceeds this threshold
enable_todos = false  # Enable todos feature for complex multi-step task management
enable_memory = false
enable_fact = false
reflection_enabled = false
save_reuse_generate_html = false  # Generate HTML visualization for saved flows (disabled by default for performance)
decomposition_strategy = "flexible"  # "exact" = one subtask per app, "flexible" = allows multiple subtasks per app
e2b_sandbox = false # use e2b for sandbox:
e2b_sandbox_mode = "per-session"  # E2B sandbox lifecycle: "per-session" = cache per thread_id (default), "single" = shared sandbox for all threads, "per-call" = new sandbox each call
e2b_sandbox_idle_ttl = 600  # Idle timeout in seconds (default: 10 min) - sandbox expires after this much idle time
e2b_sandbox_max_age = 86400  # Max age for "single" mode in seconds (24h, 0 = disabled) - prevents week-old sandboxes
e2b_sandbox_ttl_buffer = 60  # Safety buffer in seconds before E2B timeout (default: 60s)
e2b_cleanup_on_create = true  # Run periodic cleanup when creating new sandboxes
e2b_cleanup_frequency = 0  # Check all sandboxes every N get_or_create calls (0 = only on create)
message_window_limit = 100  # Maximum number of messages to keep in history (sliding window)
max_input_length = 5000  # Maximum characters allowed in user input (prevents abuse)
sub_task_keep_last_n = 5  # Number of most recent generated variables to keep when executing sub-tasks
code_executor_keep_last_n = -1  # Number of variables to keep after code execution: -1 = keep all, 1 = keep last 1, 2 = keep last 2, etc.
cuga_lite_max_steps = 70  # Maximum number of steps (call_model + sandbox cycles) before returning error
path_segment_index = 1  # Which path segment to use for operation naming (1 = first, 2 = second, 3 = third)
force_autonomous_mode = false
tool_call_timeout = 30  # Timeout in seconds for tool/API calls (sandbox operations). If exceeded, raises TimeoutError
execution_output_max_length = 50000  # Maximum characters to show in execution output (prevents token overflow)

[supervisor]
enabled = false  # Enable CugaSupervisor for multi-agent coordination
config_path = "src/cuga/backend/tools_env/registry/config/supervisor_demo_crm.yaml"  # Path to supervisor YAML config (e.g., "config/supervisor_demo_crm.yaml"). If empty, uses default supervisor setup
agent_approval = true  # Require user approval before executing any sub-agent (human-in-the-loop)
pass_variables_a2a = false  # When true, A2A delegate tool accepts variables and sends them in request metadata (A2A protocol extension)

[storage]
# [storage].mode selects policy vectors, knowledge vectors, and knowledge metadata backend (see table).
#
# | Data | local | prod |
# |------|-------|------|
# | Policy vectors | sqlite-vec in `[policy].policy_db_path` or `storage.local_db_path` (default `DBS_DIR/cuga.db`); table `[policy].collection_name` | `storage.postgres_url` (pgvector) |
# | Knowledge vectors | `{knowledge.persist_dir}/knowledge_vectors.db` (vec0 tables per collection) | `storage.postgres_url` (same stack as policy) |
# | Knowledge metadata (tasks, documents, collection_config, settings) | `{knowledge.persist_dir}/metadata.db` (default `<cwd>/.cuga/knowledge/`) | Postgres tables `cuga_knowledge_meta_*` on `storage.postgres_url` (uploaded **files** stay under `persist_dir/files/`) |
#
# Defaults: `DBS_DIR` = package `dbs/` or `CUGA_DBS_DIR`. Override `knowledge.persist_dir` in knowledge_settings.toml.
mode = "local"  # "local" | "prod"
local_db_path = ""  # default DBS_DIR/cuga.db when empty
postgres_url = ""  # required when mode=prod

[storage.embedding]
provider = "local"  # "openai", "local", or "auto" (tries OpenAI, falls back to local)
model = "BAAI/bge-small-en-v1.5"  # Model name (default for local provider)
dim = 384  # Embedding dimension (1536 for OpenAI, 384 for BAAI/bge-small-en-v1.5)
base_url = ""  # Optional: custom endpoint for OpenAI-compatible embeddings (e.g. hosted service)
api_key = ""  # Optional: API key for embedding endpoint; falls back to OPENAI_API_KEY

[policy]
enabled = true  # Enable policy system (intent guards, playbooks, tool guides, tool approvals)
collection_name = "cuga_policies"  # Collection name for storing policies
policy_db_path = ""  # Optional: path for policy DB; when empty, uses storage.local_db_path (cuga.db)
playbook_refine = false  # Enable playbook refinement based on user progress (requires LLM)
filesystem_sync = true  # Enable filesystem sync (.cuga folder) for policies
cuga_folder = ".cuga"  # Path to .cuga folder for policy files
auto_load_policies = true  # Automatically load policies from .cuga folder on startup

[service]
instance_id = ""  # Override with DYNACONF_SERVICE__INSTANCE_ID env var (e.g. K8S pod name, deployment id)
tenant_id = ""  # Override with DYNACONF_SERVICE__TENANT_ID env var (multi-tenant SaaS)

[secrets]
mode = "local"  # "local" | "vault"
force_env = true  # if true, always resolve from os.environ (ignores UI overrides and Vault)
db_encryption_key_env = "CUGA_SECRET_KEY"
vault_addr = ""
vault_token_env = "VAULT_TOKEN"
vault_auth_method = ""  # "" | token | kubernetes (env: DYNACONF_SECRETS__VAULT_AUTH_METHOD)
vault_k8s_role = ""
vault_k8s_mount_path = "kubernetes"
vault_k8s_jwt_path = "/var/run/secrets/kubernetes.io/serviceaccount/token"
vault_cacert = ""  # PEM bundle path; env VAULT_CACERT (internal / route CA)
vault_skip_verify = false  # dev only; env VAULT_SKIP_VERIFY=true
vault_mount = "secret"
vault_kv_version = ""  # "1" or "2"; leave empty to auto-detect
vault_write_enabled = false
aws_region = ""

[auth]
enabled = false
authorization_enabled = false
manage_roles = ["ServiceOwner", "ServiceAdmin"]
chat_roles = ["ServiceOwner", "ServiceAdmin", "ServiceUser"]
session_cookie_name = "cuga_session"
session_max_age = 3600
jwks_cache_ttl = 3600
require_https = false
ssl_keyfile = ""
ssl_certfile = ""
iam_proxy_url = ""
iam_proxy_skip_verify = false
iam_proxy_ca_bundle = ""  # PEM bundle path for IAM proxy TLS (independent of oidc_ca_bundle)
role_token_source = "auto"  # auto | id_token | access_token | iam_proxy

[ui]
hide_cuga_logo = false  # Set to true to hide the CUGA logo in the header
brand_name = "CUGA Agent"  # App name shown in the header

[server_ports]
registry = 8001
# registry_host = "http://localhost:8001"  # Optional: Full registry URL. Falls back to "http://localhost:{registry}"
function_call_host = ""  # Optional: URL for E2B to call functions. Falls back to registry_host, then "http://localhost:8001"
demo = 7860
apis_url = 9000
crm_api = 8007
saved_flows = 8003
environment_url = 8000
filesystem_mcp = 8112
docs_mcp = 8113
digital_sales_api = 8000
mcp_server = 8000
petstore_api = 8081
graph_visualization = 8080
orchestrate_url = 4321
trm_url = 8080
memory = 8888
oak_health_api = 8090  # cuga-oak-health OpenAPI (demo_health)

[context_summarization]
enabled = false  # Enable intelligent context summarization
keep_last_n_messages = 10  # Number of recent messages to preserve unsummarized
trim_tokens_to_summarize = 500  # Target token count for generated summaries
summarization_model = "gpt-4o-mini"  # Model to use for generating summaries (fast and cost-effective)

# Trigger conditions (at least one should be set, multiple can be active):
trigger_fraction = 0.75  # Trigger at 75% of context window (recommended for production)
# trigger_tokens = 2000  # Alternative: trigger when total tokens exceed this count
# trigger_messages = 20  # Alternative: trigger after N messages since last summary

# Optional custom summary prompt (uses LangChain default if not set):
# custom_summary_prompt = "Provide a concise summary of the conversation: {messages}"

[observability]
openlit = false  # Enable OpenLit LLM observability via OpenTelemetry (OTLP). Requires: pip install cuga[observability]
                 # Configure the OTLP endpoint via: OTEL_EXPORTER_OTLP_ENDPOINT=http://localhost:4318
                 # See deployment/docker-compose/openlit/ for a local testing stack (OTel Collector + Tempo + Prometheus + Grafana)

[evolve]
enabled = true             # Master toggle for Evolve integration
url = "http://127.0.0.1:8201/sse"  # Evolve MCP server SSE endpoint
mode = "auto"               # "auto" = registry first, then direct SSE fallback; "registry" = registry only; "direct" = direct SSE only
app_name = "evolve"         # MCP app/server name to use when Evolve is managed by the CUGA registry
lite_mode_only = true        # Only activate Evolve for CugaLite mode
save_on_success = true       # Save trajectory on successful task completion
save_on_failure = true       # Save trajectory on failed task completion
async_save = true            # Fire-and-forget trajectory saving (non-blocking)
timeout = 30.0               # Timeout in seconds for Evolve MCP calls
